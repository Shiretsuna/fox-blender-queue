name: Build & Release

# Triggers on version tags (e.g. v1.0.0) or manual dispatch from the Actions tab
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needs write access to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false   # keep building other platforms even if one fails
      matrix:
        include:
          - os: windows-latest
            build_args: --win nsis portable
            artifact_pattern: release/**/*.exe
          - os: macos-latest
            build_args: --mac dmg zip
            artifact_pattern: release/**/*.{dmg,zip}
          - os: ubuntu-latest
            build_args: --linux AppImage deb
            artifact_pattern: release/**/*.{AppImage,deb}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # electron-builder on Linux needs rpm for package tooling
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Package without publishing — each job uploads its own artifacts below
      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder ${{ matrix.build_args }} --publish never

      # Upload this platform's artifacts to the GitHub Release for this tag.
      # Creates the release automatically if it doesn't exist yet.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_pattern }}
          draft: false
          prerelease: false
